<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <meta name="theme-color" content="#FDF0F5" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="HPP Admin" />
    <link rel="icon" href="/favicon.ico" />
    <link rel="apple-touch-icon" href="/icons/apple-touch-icon.png" />
    <title>Hartinna Console</title>
    <style>
      input, select, textarea {
        font-size: 16px;
      }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <script>
      // ── Zoom prevention ─────────────────────────────────────
      document.addEventListener('gesturestart', e => e.preventDefault())
      document.addEventListener('gesturechange', e => e.preventDefault())
      document.addEventListener('gestureend', e => e.preventDefault())
      let lastTouchEnd = 0
      document.addEventListener('touchend', e => {
        const now = Date.now()
        if (now - lastTouchEnd <= 300) e.preventDefault()
        lastTouchEnd = now
      }, { passive: false })

      // ── iOS rotation viewport recovery ──────────────────────
      function resetViewportAfterRotation() {
        setTimeout(() => window.scrollTo(0, 0), 50)
        setTimeout(() => window.scrollTo(0, 0), 200)
        setTimeout(() => window.scrollTo(0, 0), 500)
      }
      window.addEventListener('orientationchange', resetViewportAfterRotation)
      let lastWidth = window.innerWidth
      window.addEventListener('resize', () => {
        if (window.innerWidth !== lastWidth) {
          lastWidth = window.innerWidth
          resetViewportAfterRotation()
        }
      })

      // ── Auto-reload on long backgrounding ───────────────────
      // Android PWA process suspension recovery
      let backgroundedAt = null
      const RELOAD_AFTER_BACKGROUND_MS = 30000  // 30 seconds
      document.addEventListener('visibilitychange', () => {
        if (document.hidden) {
          backgroundedAt = Date.now()
        } else if (backgroundedAt) {
          const awayMs = Date.now() - backgroundedAt
          backgroundedAt = null
          if (awayMs > RELOAD_AFTER_BACKGROUND_MS) {
            window.location.reload()
          }
        }
      })

      // ── Auto-reload on idle-then-interact ───────────────────
      // After 5 minutes of no interaction, the underlying Supabase connection
      // can die (Android/Windows network suspension, Chrome JS throttling).
      // Reload on next interaction to recover.
      let lastInteraction = Date.now()
      const RELOAD_AFTER_IDLE_MS = 5 * 60 * 1000  // 5 minutes
      function onInteraction() {
        const idleMs = Date.now() - lastInteraction
        lastInteraction = Date.now()
        if (idleMs > RELOAD_AFTER_IDLE_MS) {
          window.location.reload()
        }
      }
      // Capture-phase so we catch interactions before Vue handlers fire
      ;['click', 'touchstart', 'keydown'].forEach(evt => {
        document.addEventListener(evt, onInteraction, { capture: true, passive: true })
      })
    </script>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
