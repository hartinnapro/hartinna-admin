<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <meta name="theme-color" content="#FDF0F5" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="HPP Admin" />
    <link rel="icon" href="/favicon.ico" />
    <link rel="apple-touch-icon" href="/icons/apple-touch-icon.png" />
    <title>Hartinna Console</title>
    <style>
      input, select, textarea {
        font-size: 16px;
      }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <script>
      // Prevent pinch-zoom and double-tap zoom
      document.addEventListener('gesturestart', e => e.preventDefault())
      document.addEventListener('gesturechange', e => e.preventDefault())
      document.addEventListener('gestureend', e => e.preventDefault())
      let lastTouchEnd = 0
      document.addEventListener('touchend', e => {
        const now = Date.now()
        if (now - lastTouchEnd <= 300) e.preventDefault()
        lastTouchEnd = now
      }, { passive: false })

      // Force viewport recalc + scroll to top on iOS rotation
      function resetViewportAfterRotation() {
        setTimeout(() => window.scrollTo(0, 0), 50)
        setTimeout(() => window.scrollTo(0, 0), 200)
        setTimeout(() => window.scrollTo(0, 0), 500)
      }
      window.addEventListener('orientationchange', resetViewportAfterRotation)
      let lastWidth = window.innerWidth
      window.addEventListener('resize', () => {
        if (window.innerWidth !== lastWidth) {
          lastWidth = window.innerWidth
          resetViewportAfterRotation()
        }
      })

      // Auto-recover from Android PWA process suspension.
      // When the PWA returns to foreground after being backgrounded for a while,
      // force a clean reload to avoid the "pink screen of partial restoration"
      // that happens when Android partially kills the JS process under memory pressure.
      let backgroundedAt = null
      const RELOAD_AFTER_MS = 30000  // 30 seconds away → reload on return
      document.addEventListener('visibilitychange', () => {
        if (document.hidden) {
          backgroundedAt = Date.now()
        } else if (backgroundedAt) {
          const awayMs = Date.now() - backgroundedAt
          backgroundedAt = null
          if (awayMs > RELOAD_AFTER_MS) {
            window.location.reload()
          }
        }
      })
    </script>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
